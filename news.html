<!DOCTYPE html>
<html lang="id">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>News - Kelompok Kikuk Kikuk</title>
        <link rel="shortcut icon" href="./images/favicon.png"
            type="image/x-icon">
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <!-- Navigation -->
        <nav>
            <div class="nav-container">
                <div class="logo">PORTFOLIO</div>
                <ul class="nav-links" id="navLinks">
                    <li><a href="index.html" class="nav-link">Home</a></li>
                    <li><a href="index.html#team" class="nav-link">Team</a></li>
                    <li><a href="documentation.html"
                            class="nav-link">Documentation</a></li>
                    <li><a href="news.html"
                            class="nav-link active">News</a></li>
                </ul>
                <div class="burger" id="burger">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>
        </nav>

        <!-- Hero Section -->
        <section class="hero">
            <div class="hero-content">
                <h1>Latest News</h1>
                <p>Update terbaru dari tim kami</p>
            </div>
            <div class="scroll-indicator"></div>
        </section>

        <!-- News Section -->
        <section class="page-section active">

            <!-- News styles for standalone page -->
            <style>
            .news-featured { margin-bottom: 40px; }
            .featured-card {
                display: flex;
                background: #1a1a1a;
                border-radius: 20px;
                overflow: hidden;
                border: 1px solid rgba(232, 220, 196, 0.1);
                transition: all 0.3s ease;
            }
            .featured-card:hover {
                transform: translateY(-5px);
                box-shadow: 0 15px 40px rgba(232, 220, 196, 0.2);
            }
            .featured-image {
                width: 300px;
                min-height: 250px;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 5rem;
                background: linear-gradient(135deg, rgba(232,220,196,0.1), rgba(232,220,196,0.05));
            }
            .featured-content {
                padding: 30px;
                flex: 1;
            }
            .badge {
                background: #e8dcc4;
                color: #0a0a0a;
                padding: 5px 15px;
                border-radius: 20px;
                font-size: 0.8rem;
                font-weight: 700;
                display: inline-block;
                margin-bottom: 15px;
            }
            .news-meta {
                display: flex;
                gap: 20px;
                margin: 10px 0;
                color: #999;
                font-size: 0.9rem;
            }
            .news-excerpt {
                color: #bbb;
                line-height: 1.8;
                margin-bottom: 15px;
            }
            .read-more, .doc-button {
                color: #e8dcc4;
                text-decoration: none;
                font-weight: 600;
                transition: color 0.3s ease;
            }
            .read-more:hover, .doc-button:hover {
                color: #fff;
            }
            .news-grid {
                display: flex;
                justify-content: center;
            }
            .news-card {
                background: #1a1a1a;
                border-radius: 20px;
                overflow: hidden;
                border: 1px solid rgba(232, 220, 196, 0.1);
                transition: all 0.3s ease;
                max-width: 450px;
                width: 100%;
            }
            .news-card:hover {
                transform: translateY(-10px);
                box-shadow: 0 15px 40px rgba(232, 220, 196, 0.2);
            }
            .news-image {
                height: 250px;
                overflow: hidden;
                cursor: pointer;
                position: relative;
            }
            .news-image img {
                width: 100%;
                height: 100%;
                object-fit: contain;
                background: #111;
            }
            .lightbox {
                display: none;
                position: fixed;
                top: 0; left: 0;
                width: 100%; height: 100%;
                background: rgba(0,0,0,0.9);
                z-index: 9999;
                justify-content: center;
                align-items: center;
                cursor: pointer;
            }
            .lightbox.active {
                display: flex;
            }
            .lightbox img {
                max-width: 90%;
                max-height: 90%;
                object-fit: contain;
                border-radius: 10px;
            }
            .lightbox-close {
                position: absolute;
                top: 20px; right: 30px;
                color: #fff;
                font-size: 2.5rem;
                cursor: pointer;
                font-weight: bold;
            }
            .news-content {
                padding: 20px;
            }
            .news-content h4 {
                color: #e8dcc4;
                font-size: 1.1rem;
                margin-bottom: 8px;
            }
            .news-content p {
                color: #bbb;
                line-height: 1.6;
                margin-bottom: 12px;
                font-size: 0.9rem;
            }
        </style>

            <!-- News Grid -->
            <div class="news-grid">
                <!-- News 7 -->
                <div class="news-card">
                    <div class="news-image"
                        onclick="openLightbox('images/Forkikuk.jpg')"><img
                            src="images/Forkikuk.jpg"
                            alt="Pendakian Last for Grub Kikuk"></div>
                    <div class="news-content">
                        <h4>Pendakian Last for Grub Kikuk</h4>
                        <div class="news-meta">
                            <span>📅 08 Juli 2026</span>
                        </div>
                        <p>pendakian terakhir kelompok Kikuk Kikuk
                            dalam petualangan ke puncak gunung.</p>
                     
                    </div>
                </div>
            </div>
        </section>

        <!-- Footer -->
        <footer>
            <p>&copy; 2025 Kelompok Kikuk Kikuk. All rights reserved.</p>
        </footer>

        <!-- Lightbox -->
        <div class="lightbox" id="lightbox" onclick="closeLightbox()">
            <span class="lightbox-close">&times;</span>
            <img id="lightbox-img" src alt="Poster">
        </div>

        <script src="script.js"></script>
        <script>
        function openLightbox(src) {
            document.getElementById('lightbox-img').src = src;
            document.getElementById('lightbox').classList.add('active');
        }
        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
        }
    </script>
    </body>
</html>
